<!DOCTYPE html>
<html>
    <head>
        <title>Inline Styles</title>
    </head>
    <body style="background-color:powderblue;"
    
        <h1 style="background-color: red; font-size: 30px;">Heading <span style="color:blue;">One</span></h1>
        <h2 style="background-color: blue; font-size: 30px; color: aquamarine;">Heading 2</h2>
        <h2 style="background-color: red; font-size: 30px; color: brown;">Heading 2</h2>
        <h3 style="background-color: blue; font-size: 30px; color:blue;">Heading 3</h3>
        <h4 style="background-color: red; font-size: 30px; color:black;">Heading 4</h4>
        <h1 style="background-color: blue; font-size: 20px; color: rgba(255, 120, 100, .5);">Heading 1</h1>
        <h2 style="background-color: red; font-size: 20px; color:goldenrod; color: darkcyan;">Heading 2</h2>
        <h3 style="background-color: blue; font-size: 20px; color:goldenrod;">Heading 3</h3>
        <h4 style="background-color: red; font-size: 20px; color:rgb(142, 112, 36);">Heading 4</h4>
    </body>
</html>
